name: Publish Home Assistant add-on

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - Dockerfile
      - run.sh
      - config.yaml
      - build.yaml
      - Cargo.lock
      - Cargo.toml
      - hass-backend/**
      - hertta/**
      - hertta-frontend/**

permissions:
  contents: read
  packages: write

jobs:
  publish-amd64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            BUILD_FROM=debian:bookworm-slim
          tags: |
            ghcr.io/jeenou/amd64-hertta-addon:0.10.0
            ghcr.io/jeenou/amd64-hertta-addon:latest
