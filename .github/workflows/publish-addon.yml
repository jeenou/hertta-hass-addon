name: Publish Home Assistant add-on

on:
  workflow_dispatch:
  push:
    branches:
      - master
    paths:
      - Dockerfile
      - run.sh
      - config.yaml
      - build.yaml
      - hertta_addon/config.yaml
      - repository.yaml
      - .github/workflows/publish-addon.yml
      - Cargo.lock
      - Cargo.toml
      - hass-backend/**
      - hertta/**
      - hertta-frontend/**

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish ${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
          - arch: aarch64
            platform: linux/arm64

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ matrix.platform }}
          push: true
          build-args: |
            BUILD_FROM=debian:bookworm-slim
          tags: |
            ghcr.io/jeenou/${{ matrix.arch }}-hertta-addon:0.10.3
            ghcr.io/jeenou/${{ matrix.arch }}-hertta-addon:latest
